<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Care Kigali — Trusted Home Helpers in Rwanda</title>
    <meta name="description" content="Find trained and trusted maids for cleaning, cooking, shopping, and emergency home care in Kigali, Rwanda." />
    <meta property="og:title" content="Quick Care Kigali Ltd" />
    <meta property="og:description" content="Professional home care services in Kigali, Rwanda." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Plus Jakarta Sans (Airbnb Cereal feel) + Instrument Sans (Apple SF feel) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <!-- Twemoji for 3D-like emoji rendering -->
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Parse emojis to Twemoji after React renders
      const observer = new MutationObserver(() => {
        if (window.twemoji) {
          twemoji.parse(document.body, {
            folder: 'svg', ext: '.svg',
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
          });
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
